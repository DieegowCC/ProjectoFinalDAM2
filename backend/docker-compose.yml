services:
  db:
    image: postgres:17-alpine
    container_name: settapi_db
    environment:
      POSTGRES_DB: sett_db
      POSTGRES_USER: sett
      POSTGRES_PASSWORD: sett_local_dev
    ports:
      - "5432:5432"
    volumes:
      - settapi_pgdata:/var/lib/postgresql
    restart: unless-stopped

volumes:
  settapi_pgdata: